<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Wikitor — POC</title>
  <link rel="stylesheet" href="/style.css" />
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body>
  <header>
    <h1>Wikitor <span class="tag">POC</span></h1>
    <nav>
      <button id="tab-assist" class="active">Assistente IA</button>
      <button id="tab-browse">Navegar</button>
      <button id="tab-edit">Editar</button>
    </nav>
  </header>

  <main>
    <aside id="sidebar"><div class="muted">Carregando índice…</div></aside>

    <section id="content">
      <!-- Navegar / ler -->
      <div id="view-browse" class="panel hidden">
        <div id="doc-view" class="muted">Selecione um documento no índice.</div>
      </div>

      <!-- Editar manualmente -->
      <div id="view-edit" class="panel hidden">
        <h2>Edição manual</h2>
        <label>Título <input id="e-titulo" type="text" /></label>
        <div class="row">
          <label>Assunto <input id="e-assunto" type="text" /></label>
          <label>Nível
            <select id="e-nivel">
              <option value="iniciante">iniciante</option>
              <option value="intermediario">intermediario</option>
              <option value="avancado">avancado</option>
            </select>
          </label>
        </div>
        <input id="e-id" type="hidden" />
        <label>Conteúdo (markdown)
          <textarea id="e-conteudo" rows="16"></textarea>
        </label>
        <div class="row">
          <button id="btn-save" class="primary">Salvar (gera resumo + reindexa)</button>
          <button id="btn-new">Novo documento</button>
          <span id="edit-status" class="muted"></span>
        </div>
      </div>

      <!-- Assistente IA unificado (responde, redige e salva — tudo na conversa) -->
      <div id="view-assist" class="panel chatview">
        <div id="assist-log" class="chatlog">
          <div class="chat-empty muted">Converse com o assistente.<br>Pergunte sobre a wiki ou peça para criar/editar um documento — ele conduz tudo e salva quando você confirmar.</div>
        </div>
        <div class="chat-inputbar">
          <input id="a-msg" type="text" placeholder="Pergunte algo ou peça para documentar um assunto…" autocomplete="off" />
          <button id="btn-assist" class="primary">Enviar</button>
        </div>
      </div>
    </section>
  </main>

  <script src="/app.js"></script>
</body>
</html>
